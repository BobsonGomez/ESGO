<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Section B: Management & Process</title>
    <link rel="stylesheet" href="CSS/create_report.css">
    <style>
        /* Matrix Table Specific Styles */
        .matrix-table th { font-size: 11px; text-align: center; background: #e0f2fe; }
        .matrix-table td { text-align: center; }
        .matrix-table input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .policy-input { width: 100%; border: none; background: transparent; font-weight: 500; }
        .policy-input:focus { outline: none; border-bottom: 1px solid #108a55; }
    </style>
</head>
<body>

<header class="navbar">
    <h1 class="logo">ESGO Industry Portal</h1>
</header>

<div class="container">
    <h2 class="page-title">Section B: Management & Process Disclosures</h2>
    <p class="subtitle">Map your policies to the 9 NGRBC Principles.</p>

    <form id="sectionBForm" onsubmit="event.preventDefault(); submitFinalReport();">

        <!-- 1. Policy Matrix -->
        <div class="form-section">
            <div class="section-header">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>
                1. Policy vs. Principles Mapping
            </div>
            <p style="font-size:12px; color:#666; margin-bottom:10px;">Check the box if the policy covers the respective principle (P1-P9).</p>

            <div style="overflow-x:auto;">
                <table class="input-table matrix-table" id="policyTable">
                    <thead>
                    <tr>
                        <th style="text-align:left; width: 250px; background:#f1f5f9;">Policy Name</th>
                        <th>P1</th><th>P2</th><th>P3</th><th>P4</th><th>P5</th>
                        <th>P6</th><th>P7</th><th>P8</th><th>P9</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!-- Rows added via JS -->
                    </tbody>
                </table>
            </div>
            <button type="button" class="btn-add-row" onclick="addPolicyRow()">+ Add Policy</button>
        </div>

        <!-- 2. Governance -->
        <div class="form-section">
            <div class="section-header">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                2. Governance & Oversight
            </div>

            <div class="form-group">
                <label>Director's Statement (ESG Highlights)</label>
                <textarea id="governanceStatement" rows="4" placeholder="Enter the statement from the Director responsible for BRSR..."></textarea>
            </div>

            <div class="form-group">
                <label>Highest Authority for Oversight</label>
                <input type="text" id="oversightAuthority" placeholder="e.g. CSR Committee / Board of Directors">
            </div>
        </div>

        <!-- Buttons -->
        <div style="display:flex; justify-content: space-between; margin-top:20px;">
            <button type="button" class="btn-logout" onclick="window.location.href='create_report.html?edit='+localStorage.getItem('currentReportId')">&larr; Previous</button>

            <!-- CHANGED: From Generate to Next -->
            <button type="button" class="btn-submit" onclick="saveAndNext()" style="width: auto; padding: 12px 30px;">
                Next: Section C (Performance) &rarr;
            </button>
        </div>

<script src="SCRIPTJS/create_report_2.js"></script>
</body>
</html>
