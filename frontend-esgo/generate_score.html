<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI ESG Analysis</title>
    <link rel="stylesheet" href="CSS/industry_homepage.css">
    <style>
        body { background-color: #f0f2f5; }
        .center-wrapper {
            display: flex; justify-content: center; align-items: center;
            min-height: 80vh; padding: 20px;
        }
        .ai-card {
            background: white; width: 100%; max-width: 500px;
            padding: 40px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }
        .upload-zone {
            border: 2px dashed #cbd5e1; border-radius: 12px;
            padding: 40px 20px; margin: 25px 0;
            background-color: #f8fafc; cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-zone:hover { border-color: #3498db; background-color: #eff6ff; }
        .upload-icon { color: #64748b; margin-bottom: 10px; }

        /* Score Animation */
        .score-display { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; display: none; }
        .big-number {
            font-size: 48px; font-weight: 800; color: #2ecc71;
            margin: 10px 0;
        }
        .metric-row { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        .metric-box {
            flex: 1; background: #f1f5f9; padding: 10px; border-radius: 8px;
            font-size: 14px; font-weight: 600; color: #334155;
        }
        .metric-box span { display: block; font-size: 18px; color: #3498db; margin-top: 5px; }
    </style>
</head>
<body>

<header class="navbar">
    <div class="brand"><h1>ESGO AI</h1></div>
    <button class="btn-logout" onclick="window.location.href='industry_homepage.html'" style="color:#555; border-color:#ccc;">
        Close
    </button>
</header>

<div class="center-wrapper">
    <div class="ai-card">
        <h2 style="color: #1e293b; margin-bottom: 10px;">AI ESG Predictor</h2>
        <p style="color: #64748b; font-size: 14px;">Upload your report to get an instant ESG score analysis.</p>

        <!-- Upload Zone -->
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
            </div>
            <h4 id="fileName" style="margin:0; color:#334155;">Click to Upload Report</h4>
            <p style="margin:5px 0 0 0; font-size:12px; color:#94a3b8;">PDF or DOCX (Max 10MB)</p>
            <input type="file" id="fileInput" hidden onchange="handleFileSelect()">
        </div>

        <button onclick="uploadAndScore()" class="btn-action btn-blue" style="padding: 14px; font-size: 16px;">
            Analyze Report
        </button>

        <!-- Results -->
        <div id="resultSection" class="score-display">
            <p style="font-weight: 600; color: #64748b; margin-bottom:0;">Predicted ESG Score</p>
            <div class="big-number" id="totalScore">--</div>

            <div class="metric-row">
                <div class="metric-box">Env <span><span id="eScore">-</span></span></div>
                <div class="metric-box">Soc <span><span id="sScore">-</span></span></div>
                <div class="metric-box">Gov <span><span id="gScore">-</span></span></div>
            </div>
            <p id="aiAnalysisText" style="font-size:12px; color:#64748b; margin-top:15px; font-style:italic;"></p>
        </div>
    </div>
</div>

<script src="SCRIPTJS/generate_score.js"></script>
</body>
</html>
