<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ESG Analysis</title>
    <link rel="stylesheet" href="CSS/generate_score.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">ESGO AI</div>
    <div class="nav-actions">
        <button class="btn-close" onclick="window.location.href='industry_homepage.html'">
            &larr; Exit
        </button>
    </div>
</nav>

<div class="center-wrapper">
    <div class="ai-card">

        <div class="ai-header">
            <h2>Local Model Predictor</h2>
            <p>Upload your sustainability report (PDF) for instant, secure local analysis.</p>
        </div>

        <!-- Upload Zone -->
        <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">
                <!-- Cloud Upload Icon -->
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            </div>
            <h4 id="fileName">Click to Select Report</h4>
            <p>Supported format: PDF (Max 10MB)</p>
            <input type="file" id="fileInput" accept=".pdf" hidden onchange="handleFileSelect()">
        </div>

        <button id="analyzeBtn" onclick="uploadAndScore()" class="btn-action">
            Start Analysis
        </button>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p id="loadingText">Initializing Engine...</p>
        </div>

        <!-- Results Section -->
        <div id="resultSection" class="score-display">
            <p class="result-label" style="text-align: center;">Predicted ESG Score</p>
            <div class="big-number" id="totalScore">--</div>

            <div class="metric-row">
                <div class="metric-box">
                    <span class="label">Environmental</span>
                    <span class="val" id="eScore">-</span>
                </div>
                <div class="metric-box">
                    <span class="label">Social</span>
                    <span class="val" id="sScore">-</span>
                </div>
                <div class="metric-box">
                    <span class="label">Governance</span>
                    <span class="val" id="gScore">-</span>
                </div>
            </div>

            <div id="aiAnalysisText" class="analysis-text"></div>

            <!-- Gap Analysis -->
            <div id="gapAnalysisSection" class="gap-section">
                <div class="gap-title">
                    <!-- Warning Icon -->
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    Compliance Gaps (BRSR)
                </div>
                <div class="gap-grid" id="gapGrid">
                    <!-- JS Injects Cards Here -->
                </div>
            </div>

        </div>
    </div>
</div>

<script src="SCRIPTJS/generate_score.js"></script>
</body>
</html>
