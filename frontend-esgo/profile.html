<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - ESGO</title>

    <!-- Link to industry styles for the Navbar -->
    <link rel="stylesheet" href="CSS/industry_homepage.css">

    <!-- Link to the dedicated styles for this page -->
    <link rel="stylesheet" href="CSS/profile.css">
</head>
<body>

<!-- This empty container is where the JS will build the navbar -->
<nav class="navbar" id="mainNavbar"></nav>

<div class="profile-container">
    <div class="profile-card">
        <h2>Edit Your Profile</h2>
        <p>Update your personal details below.</p>

        <form id="profileForm" onsubmit="handleUpdate(event)">
            <div class="pfp-section">
                <!-- Added a default placeholder that looks good circular -->
                <img id="pfpPreview" src="https://ui-avatars.com/api/?name=User&background=random" alt="Profile Picture">

                <!-- The label acts as the button -->
                <label for="pfpInput" class="pfp-upload-btn" title="Change Profile Picture"></label>
                <input type="file" id="pfpInput" onchange="previewImage(event)" accept="image/*" style="display: none;">
            </div>

            <div class="form-group">
                <label for="fullNameInput">Full Name</label>
                <input type="text" id="fullNameInput" required placeholder="e.g. John Doe">
            </div>

            <div class="form-group">
                <label for="usernameInput">Username</label>
                <!-- Removed inline styles, CSS handles readonly now -->
                <input type="text" id="usernameInput" readonly>
            </div>

            <button type="submit" class="btn-save">Save Changes</button>
        </form>
    </div>
</div>

<script src="SCRIPTJS/profile.js"></script>
</body>
</html>
