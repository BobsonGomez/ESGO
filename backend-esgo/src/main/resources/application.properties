spring.application.name=esgo-backend
spring.datasource.url=jdbc:mysql://localhost:3306/esgo_db
spring.datasource.username=root
spring.datasource.password=esgo2025*
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- CRITICAL UPLOAD FIXES ---

# 1. Enable Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# 2. FIX FOR "FileCountLimitExceeded"
# This tells Tomcat: "It's okay to receive a form with many fields + a file"
server.tomcat.max-parameter-count=10000

# 3. Connection Settings
server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB