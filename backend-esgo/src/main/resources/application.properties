spring.application.name=esgo-backend
spring.datasource.url=jdbc:mysql://localhost:3306/esgo_db
spring.datasource.username=root
spring.datasource.password=esgo2025*
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- CRITICAL UPLOAD FIXES ---
# --- ULTIMATE UPLOAD LIMIT BYPASS ---

# 1. Spring Boot Multipart Limits (Set to 100MB to be extremely safe)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# 2. Tell Spring to use your system's default temp folder so it doesn't run out of memory
spring.servlet.multipart.file-size-threshold=10MB

# 3. Tomcat Internal Limits (-1 means UNLIMITED)
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1